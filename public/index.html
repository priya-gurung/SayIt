<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SayIt — Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen active">
      <div class="auth-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
      </div>
      <div class="auth-container">
        <div class="auth-brand">
          <span class="brand-dot"></span>
          <h1>Connect</h1>
        </div>
        <p class="auth-tagline">Real-time messaging, distilled.</p>

        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">Sign In</button>
          <button class="tab-btn" data-tab="register">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="auth-form active">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="login-email"
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" />
          </div>
          <div id="login-error" class="form-error"></div>
          <button class="btn-primary" id="login-btn">
            <span>Sign In</span>
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="auth-form">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" placeholder="coolhandle" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="reg-password"
              placeholder="min. 6 characters"
            />
          </div>
          <div id="register-error" class="form-error"></div>
          <button class="btn-primary" id="register-btn">
            <span>Create Account</span>
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-screen" class="screen">
      <div class="app-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <div class="sidebar-brand">
              <span class="brand-dot small"></span>
              <span>Connect</span>
            </div>
            <div class="sidebar-actions">
              <button
                class="icon-btn"
                id="search-toggle-btn"
                title="New conversation"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="11" cy="11" r="8" />
                  <path d="m21 21-4.35-4.35" />
                </svg>
              </button>
              <button class="icon-btn" id="logout-btn" title="Sign out">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
                  />
                </svg>
              </button>
              <div class="profile-container">
                <button class="icon-btn" id="profile-btn" title="Profile">
                  <div class="avatar-wrapper">
                    <div class="avatar" id="my-avatar"></div>
                    <span class="status-dot online"></span>
                  </div>
                </button>

                <div class="profile-popup" id="profile-popup">
                  <div class="popup-user">
                    <div class="avatar small" id="popup-avatar"></div>
                    <div class="popup-info">
                      <div class="popup-name" id="popup-username"></div>
                      <div class="popup-status">
                        Online
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Current user info -->
          <!-- <div class="current-user">
            <div class="user-info">
              <span class="username" id="my-username"></span>
              <span class="status-dot online"></span>
            </div>
          </div> -->

          <!-- Search -->
          <div id="search-panel" class="search-panel">
            <div class="search-input-wrap">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
              </svg>
              <input
                type="text"
                id="user-search"
                placeholder="Search users..."
              />
            </div>
            <div id="search-results" class="search-results"></div>
          </div>

          <!-- Conversations list -->
          <div class="conversations-label">Messages</div>
          <div id="conversations-list" class="conversations-list">
            <div class="empty-state">
              <svg
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                />
              </svg>
              <p>
                No conversations yet.<br />Search for users to start chatting.
              </p>
            </div>
          </div>
        </aside>

        <!-- CHAT PANEL -->
        <main class="chat-panel">
          <!-- Empty state -->
          <div id="chat-empty" class="chat-empty">
            <div class="chat-empty-icon">
              <svg
                width="48"
                height="48"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                />
              </svg>
            </div>
            <h2>Select a conversation</h2>
            <p>Pick a chat from the left or search for someone new.</p>
          </div>

          <!-- Active chat -->
          <div id="chat-active" class="chat-active hidden">
            <!-- Chat header -->
            <div class="chat-header">
              <div class="chat-header-user">
                <div class="avatar" id="chat-avatar"></div>
                <div> 
                  <div class="chat-username" id="chat-username"></div>
                  <div class="chat-status" id="chat-status">offline</div>
                </div>
              </div>
            </div>

            <!-- Messages area -->
            <div id="messages-container" class="messages-container">
              <div id="messages-list" class="messages-list"></div>
              <div id="typing-indicator" class="typing-indicator hidden">
                <span></span><span></span><span></span>
              </div>
            </div>

            <!-- Message input -->
            <div class="message-input-area">
              <div class="input-wrap">
                <textarea
                  id="message-input"
                  placeholder="Type a message..."
                  rows="1"
                  maxlength="2000"
                ></textarea>
                <button class="send-btn" id="send-btn">
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                  >
                    <path d="m22 2-7 20-4-9-9-4 20-7z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
